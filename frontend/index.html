<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="SenseBridge AI — A Universal Accessibility Layer for an Inclusive World. AI that converts real-world information into personalized sensory formats." />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Tamil:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Gurmukhi:wght@400;700&family=Noto+Sans+Kannada:wght@400;700&family=Noto+Sans+Gujarati:wght@400;700&family=Noto+Sans+Telugu:wght@400;700&display=swap"
        rel="stylesheet" />
    <title>SenseBridge AI — Universal Accessibility Layer</title>
</head>

<body>
    <!-- FOUC Prevention: apply theme before React renders -->
    <script>
        (function () {
            try {
                var dark = JSON.parse(localStorage.getItem('sb-dark-mode'));
                if (dark === true || (dark === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
                if (JSON.parse(localStorage.getItem('sb-large-text'))) document.documentElement.classList.add('large-text');
                if (JSON.parse(localStorage.getItem('sb-high-contrast'))) document.documentElement.classList.add('high-contrast');
                if (JSON.parse(localStorage.getItem('sb-reduce-motion'))) document.documentElement.classList.add('reduce-motion');
            } catch (e) { }
        })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
